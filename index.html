let klanten = [];
let vorigeKlanten = null;
let actieveFilter = 'all';
let actieveNotitie = null;
let modalId = null;
let actieveTab = 'gedaan';
let undoTimer = null;
let syncBezig = false;

// ── Sync ──────────────────────────────────────────────────────────────────────

function setSyncStatus(status, tekst) {
  const dot = document.getElementById('sync-dot');
  const txt = document.getElementById('sync-tekst');
  dot.className = 'sync-dot' + (status === 'bezig' ? ' bezig' : status === 'fout' ? ' fout' : '');
  txt.textContent = tekst;
}

function rowsNaarKlanten(rows) {
  return rows.filter(r => r.length >= 5 && r[0]).map(r => ({
    id: Number(r[0]), naam: String(r[1]), plaats: String(r[2]),
    freq: parseFloat(r[3]), laatste: String(r[4]), notitie: String(r[5] || '')
  }));
}

function klantenNaarRows(kl) {
  return kl.map(k => [k.id, k.naam, k.plaats, k.freq, k.laatste, k.notitie]);
}

async function syncLaden() {
  setSyncStatus('bezig', 'Laden...');
  try {
    const resp = await fetch(SCRIPT_URL + '?t=' + Date.now());
    const rows = await resp.json();
    if (Array.isArray(rows) && rows.length > 0) {
      klanten = rowsNaarKlanten(rows);
      localStorage.setItem('gw_v5', JSON.stringify(klanten));
      setSyncStatus('ok', 'Gesynchroniseerd');
      render();
      return true;
    }
  } catch(e) {
    setSyncStatus('fout', 'Offline');
  }
  return false;
}

async function syncOpslaan() {
  setSyncStatus('bezig', 'Opslaan...');
  localStorage.setItem('gw_v5', JSON.stringify(klanten));
  try {
    await fetch(SCRIPT_URL, {
      method: 'POST',
      mode: 'no-cors',
      body: JSON.stringify(klantenNaarRows(klanten))
    });
    setSyncStatus('ok', 'Opgeslagen ✓');
  } catch(e) {
    setSyncStatus('fout', 'Opslaan mislukt');
  }
}

// ── Data ──────────────────────────────────────────────────────────────────────

function lokalLaden() {
  const s = localStorage.getItem('gw_v5');
  klanten = s ? JSON.parse(s) : JSON.parse(JSON.stringify(STANDAARD));
}

function slaOp(omschrijving) {
  vorigeKlanten = JSON.parse(JSON.stringify(klanten));
  toonUndo(omschrijving);
}

function toonUndo(tekst) {
  document.getElementById('undo-tekst').textContent = tekst;
  document.getElementById('undo-balk').classList.add('zichtbaar');
  if (undoTimer) clearTimeout(undoTimer);
  undoTimer = setTimeout(() => {
    document.getElementById('undo-balk').classList.remove('zichtbaar');
    vorigeKlanten = null;
  }, 6000);
}

function undo() {
  if (!vorigeKlanten) return;
  klanten = vorigeKlanten;
  vorigeKlanten = null;
  document.getElementById('undo-balk').classList.remove('zichtbaar');
  if (undoTimer) clearTimeout(undoTimer);
  syncOpslaan(); render();
}

// ── Helpers ───────────────────────────────────────────────────────────────────

function volgende(laatste, freq) {
  const d = new Date(laatste);
  d.setTime(d.getTime() + freq * 7 * 86400000);
  return d;
}
function laaatsteVanVolgende(gewenst, freq) {
  const d = new Date(gewenst);
  d.setTime(d.getTime() - freq * 7 * 86400000);
  return d.toISOString().split('T')[0];
}
function dagenTot(laatste, freq) {
  const due = volgende(laatste, freq);
  const today = new Date(); today.setHours(0,0,0,0); due.setHours(0,0,0,0);
  return Math.round((due - today) / 86400000);
}
function status(dagen) {
  if (dagen <= 0) return 'urgent';
  if (dagen <= 10) return 'soon';
  return 'ok';
}
function formatDue(due) {
  const today = new Date(); today.setHours(0,0,0,0);
  const d = new Date(due); d.setHours(0,0,0,0);
  const diff = Math.round((d - today) / 86400000);
  if (diff < 0) return `${Math.abs(diff)}d te laat`;
  if (diff === 0) return 'Vandaag!';
  if (diff === 1) return 'Morgen';
  if (diff < 7) return `Over ${diff} dagen`;
  return d.toLocaleDateString('nl-NL', {day:'numeric', month:'long'});
}
function formatDatum(d) { return new Date(d).toLocaleDateString('nl-NL', {day:'numeric', month:'short', year:'numeric'}); }
function formatLang(d) { return new Date(d).toLocaleDateString('nl-NL', {weekday:'long', day:'numeric', month:'long'}); }
function vandaag() { return new Date().toISOString().split('T')[0]; }

// ── Render ────────────────────────────────────────────────────────────────────

function render() {
  const met = klanten
    .map(k => ({ ...k, dagen: dagenTot(k.laatste, k.freq), due: volgende(k.laatste, k.freq) }))
    .sort((a, b) => a.dagen - b.dagen);

  document.getElementById('num-urgent').textContent = met.filter(k => status(k.dagen)==='urgent').length;
  document.getElementById('num-soon').textContent   = met.filter(k => status(k.dagen)==='soon').length;
  document.getElementById('num-ok').textContent     = met.filter(k => status(k.dagen)==='ok').length;
  document.getElementById('header-sub').textContent = `${klanten.length} klanten · op volgorde`;

  const kl = {urgent:'#e05c2a', soon:'#e8a020', ok:'#2a9d63'};
  ['urgent','soon','ok'].forEach(f => {
    const el = document.getElementById('stat-' + f);
    if (actieveFilter === f) {
      el.style.background = kl[f]; el.style.borderColor = kl[f];
      el.querySelector('.num').style.color = 'white';
      el.querySelector('.lbl').style.color = 'rgba(255,255,255,0.8)';
    } else {
      el.style.background = 'rgba(255,255,255,0.9)';
      el.style.borderColor = f === 'urgent' ? '#f5c4b4' : 'rgba(26,111,168,0.12)';
      el.querySelector('.num').style.color = kl[f];
      el.querySelector('.lbl').style.color = '#5a8aaa';
    }
  });
  ['all','urgent','soon','ok'].forEach(f =>
    document.getElementById('fbtn-' + f).classList.toggle('actief', actieveFilter === f)
  );

  const gefilterd = actieveFilter === 'all' ? met : met.filter(k => status(k.dagen) === actieveFilter);
  const el = document.getElementById('lijst');
  if (!gefilterd.length) {
    el.innerHTML = '<div class="leeg"><div class="icon">🪟</div><p>Geen klanten in deze categorie</p></div>';
    return;
  }
  el.innerHTML = gefilterd.map(k => {
    const st = status(k.dagen);
    const nOpen = actieveNotitie === k.id;
    return `
      <div class="kaart ${st}">
        <div class="kaart-top">
          <div class="dot ${st}"></div>
          <div class="kaart-naam">
            <strong>${k.naam}</strong>
            ${k.plaats ? `<span>📍 ${k.plaats}</span>` : ''}
          </div>
          <div class="badge ${st}" onclick="openModal(${k.id})">
            ${formatDue(k.due)}<small>${formatDatum(k.due)}</small>
          </div>
        </div>
        <div class="kaart-freq">Elke ${FREQ_LABELS[k.freq]||k.freq+'wkn'} &nbsp;·&nbsp; <span style="color:#1a6fa8;cursor:pointer" onclick="openModal(${k.id})">✏ aanpassen</span></div>
        ${nOpen ? `<textarea class="kaart-notitie-input" onchange="slaNotitieOp(${k.id},this.value)" placeholder="Notitie...">${k.notitie||''}</textarea>` : (k.notitie ? `<div class="kaart-notitie-tekst">📝 ${k.notitie}</div>` : '')}
        <div class="kaart-acties">
          <button class="btn-gedaan" onclick="openModal(${k.id})">✓ Gedaan</button>
          <button class="btn-notitie" onclick="toggleNotitie(${k.id})">${nOpen?'✕':'📝'}</button>
          <button class="btn-del" onclick="verwijder(${k.id})">🗑</button>
        </div>
      </div>`;
  }).join('');
}

// ── Acties ────────────────────────────────────────────────────────────────────

function setFilter(f) { actieveFilter = f; render(); }
function toggleFilter(f) { actieveFilter = actieveFilter===f?'all':f; render(); }

function toggleToevoegen() {
  const b = document.getElementById('toevoegen-body');
  b.classList.toggle('open');
  document.getElementById('toggle-pijl').textContent = b.classList.contains('open')?'▴':'▾';
}

async function voegToe() {
  const naam = document.getElementById('nieuw-naam').value.trim();
  const freq = parseFloat(document.getElementById('nieuw-freq').value);
  const datum = document.getElementById('nieuw-datum').value;
  if (!naam||!datum) { alert('Vul naam en datum in.'); return; }
  slaOp(`"${naam}" toegevoegd`);
  klanten.push({ id: Date.now(), naam, plaats:'', freq, laatste: datum, notitie:'' });
  document.getElementById('nieuw-naam').value = '';
  await syncOpslaan(); render();
}

function toggleNotitie(id) { actieveNotitie = actieveNotitie===id?null:id; render(); }

async function slaNotitieOp(id, val) {
  slaOp('Notitie gewijzigd');
  klanten = klanten.map(k => k.id===id?{...k,notitie:val}:k);
  await syncOpslaan();
}

async function verwijder(id) {
  if (!confirm('Klant verwijderen?')) return;
  const k = klanten.find(k=>k.id===id);
  slaOp(`"${k.naam}" verwijderd`);
  klanten = klanten.filter(k=>k.id!==id);
  await syncOpslaan(); render();
}

function openModal(id) {
  modalId = id;
  const k = klanten.find(k=>k.id===id);
  document.getElementById('modal-naam').textContent = k.naam;
  document.getElementById('modal-gedaan-datum').value = vandaag();
  document.getElementById('modal-gedaan-datum').max = vandaag();
  document.getElementById('modal-volgende-datum').value = volgende(k.laatste,k.freq).toISOString().split('T')[0];
  setTab('gedaan'); updateVolgende();
  document.getElementById('modal').classList.add('open');
}

function modalBuitenKlik(e) { if (e.target===document.getElementById('modal')) sluitModal(); }

function setTab(tab) {
  actieveTab = tab;
  document.getElementById('tab-gedaan').classList.toggle('actief', tab==='gedaan');
  document.getElementById('tab-aanpassen').classList.toggle('actief', tab==='aanpassen');
  document.getElementById('sectie-gedaan').style.display = tab==='gedaan'?'block':'none';
  document.getElementById('sectie-aanpassen').style.display = tab==='aanpassen'?'block':'none';
  document.getElementById('modal-titel').textContent = tab==='gedaan'?'✓ Gedaan!':'✏ Datum aanpassen';
}

function updateVolgende() {
  const k = klanten.find(k=>k.id===modalId);
  if (!k) return;
  const datum = document.getElementById('modal-gedaan-datum').value;
  if (!datum) return;
  document.getElementById('modal-volgende').textContent = formatLang(volgende(datum,k.freq));
}

function sluitModal() { document.getElementById('modal').classList.remove('open'); modalId=null; }

async function bevestig() {
  const k = klanten.find(k=>k.id===modalId);
  if (!k) return;
  if (actieveTab==='gedaan') {
    const datum = document.getElementById('modal-gedaan-datum').value;
    if (!datum) return;
    slaOp(`"${k.naam}" gemarkeerd als gedaan`);
    klanten = klanten.map(k=>k.id===modalId?{...k,laatste:datum}:k);
  } else {
    const gewenst = document.getElementById('modal-volgende-datum').value;
    if (!gewenst) return;
    slaOp(`Datum "${k.naam}" aangepast`);
    klanten = klanten.map(k=>k.id===modalId?{...k,laatste:laaatsteVanVolgende(gewenst,k.freq)}:k);
  }
  await syncOpslaan(); sluitModal(); render();
}

// ── Init ──────────────────────────────────────────────────────────────────────

if ('serviceWorker' in navigator) {
  const sw = `self.addEventListener('install',e=>self.skipWaiting());self.addEventListener('fetch',e=>e.respondWith(fetch(e.request).catch(()=>caches.match(e.request))))`;
  navigator.serviceWorker.register(URL.createObjectURL(new Blob([sw],{type:'application/javascript'}))).catch(()=>{});
}

document.getElementById('nieuw-datum').value = vandaag();
lokalLaden();
render();

// Laad vanuit Google Sheets, als dat mislukt gebruik lokale data
syncLaden().then(ok => {
  if (!ok) {
    setSyncStatus('fout', 'Offline modus');
  }
  // Daarna elke 30 seconden verversen
  setInterval(syncLaden, 30000);
});
</script>
